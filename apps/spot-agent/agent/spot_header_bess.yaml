# spot_header_bess.yaml
# Configuration for bess-platform spot report ingestion.
# Local files live under bess-platform/data/spot reports/ in year sub-folders.

# Default year used when a page contains no year in its date header.
# Per-PDF year is still auto-inferred from the folder path or S3 key when possible.
year: 2025

# Source mode:
#   local -> preserve the existing Windows / OneDrive glob behavior
#   s3    -> list PDFs from S3, stage each file to temp local disk, then parse
source_mode: local

# Existing local multi-year glob patterns.
pdf_globs:
  - "C:/Users/dipeng.chen/OneDrive/ETRM/bess-platform/data/spot reports/2024/*.pdf"
  - "C:/Users/dipeng.chen/OneDrive/ETRM/bess-platform/data/spot reports/2025/*.pdf"
  - "C:/Users/dipeng.chen/OneDrive/ETRM/bess-platform/data/spot reports/2026/*.pdf"

# Optional S3-backed source mode for AWS-safe ingestion.
# Leave blank when source_mode=local.
s3_bucket: ""
s3_region: "ap-southeast-1"
s3_prefixes: []

